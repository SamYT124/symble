<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>symble</title>
    <style>
        body { background-color: #012f05; color: rgb(203, 247, 214); font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        #game-board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-top: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 58px; height: 58px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; transition: transform 0.2s; }
        .tile.filled { border-color: #565758; }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }

        input { margin-top: 20px; padding: 10px; background: #121213; border: 1px solid #3a3a3c; color: white; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        #message { margin-top: 20px; font-weight: bold; height: 24px; }
    </style>
</head>
<body>

    <h1>SYMBLE</h1>
    <p>Made by SamYT124</p>
    <div id="game-board"></div>
    <input type="text" id="guess-input" maxlength="5" autofocus placeholder="Type here">
    <div id="message"></div>

    <script>
        const wordlist = ["!", "@", "#", "$", "%", "^", "&", "*", "(", ")", "_", "-", "=", "+", "[", "]", "{", "}", "|", ";", ":", "'", ",", ".", "/", "?", "<", ">"]
        const SECRET = wordlist[Math.floor(Math.random() * wordlist.length)].toUpperCase() + wordlist[Math.floor(Math.random() * wordlist.length)].toUpperCase() + wordlist[Math.floor(Math.random() * wordlist.length)].toUpperCase() + wordlist[Math.floor(Math.random() * wordlist.length)].toUpperCase() + wordlist[Math.floor(Math.random() * wordlist.length)].toUpperCase();
        console.log(SECRET);
        let currentAttempt = 0;
        const board = document.getElementById("game-board");
        const input = document.getElementById("guess-input");
        const msg = document.getElementById("message");

        for (let i = 0; i < 6; i++) {
            const row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement("div");
                tile.className = "tile";
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const guess = input.value.toUpperCase();
                if (guess.length !== 5) {
                    msg.textContent = "Must be 5 symbols!";
                    return;
                }
                processGuess(guess);
                input.value = "";
            }
        });

        function processGuess(guess) {
            const row = board.children[currentAttempt];
            const tiles = row.children;
            let secretCheck = SECRET.split("");
            for (let i = 0; i < 5; i++) {
                tiles[i].textContent = guess[i];
                if (guess[i] === SECRET[i]) {
                    tiles[i].classList.add("correct");
                    secretCheck[i] = null; 
                }
            }
            for (let i = 0; i < 5; i++) {
                if (tiles[i].classList.contains("correct")) continue;

                const indexInSecret = secretCheck.indexOf(guess[i]);
                if (indexInSecret > -1) {
                    tiles[i].classList.add("present");
                    secretCheck[indexInSecret] = null;
                } else {
                    tiles[i].classList.add("absent");
                }
            }

            if (guess === SECRET) {
                msg.textContent = "You got it! Refresh the page to play again.";
                input.disabled = true;
            } else {
                currentAttempt++;
                if (currentAttempt === 6) {
                    msg.textContent = `Game Over. It was ${SECRET}`;
                    input.disabled = true;
                }
            }
        }
    </script>
</body>
</html>
